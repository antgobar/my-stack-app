{% extends "base.html" %}

{% block title %}Home — {{ app_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h1 class="display-6 fw-bold mb-4">
            <i class="bi bi-music-note-list me-2"></i>Tracks
        </h1>

        {% if tracks %}
        <div class="list-group shadow-sm">
            {% for track in tracks %}
            <div class="list-group-item list-group-item-action d-flex align-items-center gap-3 py-3">
                <div class="flex-shrink-0 text-secondary fs-4">
                    <i class="bi bi-music-note-beamed"></i>
                </div>
                <div class="flex-grow-1 min-width-0">
                    <div class="fw-semibold text-truncate">{{ track.title }}</div>
                    <div class="small text-muted text-truncate">{{ track.artist }}</div>
                </div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <p class="text-muted">No tracks found.</p>
        {% endif %}
    </div>
</div>
{% endblock %}
