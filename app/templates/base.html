<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    {% block extra_css %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-md navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-music-note-beamed me-2"></i>MySpot
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav nav-underline ms-3">
                <li class="nav-item">
                    <a class="nav-link text-white{% if request.url.path == '/' %} active{% endif %}" href="/">
                        <i class="bi bi-music-note-list me-1"></i>Tracks
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white{% if request.url.path == '/favourites' %} active{% endif %}" href="/favourites">
                        <i class="bi bi-heart me-1"></i>Favourites
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white{% if request.url.path == '/queue' %} active{% endif %}" href="/queue">
                        <i class="bi bi-collection-play me-1"></i>Queue
                    </a>
                </li>
                {% block nav_items %}{% endblock %}
            </ul>
        </div>
    </div>
</nav>

<main class="container my-4">
    {% for category, message in (messages or []) %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    {% endfor %}

    {% block content %}{% endblock %}
</main>

<footer class="bg-light border-top py-3 mt-auto">
    <div class="container text-center text-muted small">
        MySpot
    </div>
</footer>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

{% block extra_js %}{% endblock %}
</body>
</html>
